services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vboost
      POSTGRES_USER: vboost
      POSTGRES_PASSWORD: vboost_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://vboost:vboost_pass@db:5432/vboost
      ZEFAME_API_KEY: ${ZEFAME_API_KEY}
      ALLOWED_ORIGIN: http://localhost:3001
    depends_on:
      - db

volumes:
  pgdata:
